services:
  db:
    image: postgres:16-alpine
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: baukis2_development   # ← 明示的に追加（おすすめ）
    ports:
      #- "5432:5432"
      - "5433:5432"        # ← ここを5433:5432 に変更（ホスト側を5433に）
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d baukis2_development"]  # ← DB名指定で精度UP
      interval: 5s      # 短めにチェック
      timeout: 5s
      retries: 12       # リトライを増やして余裕を持たせる
      start_period: 25s # Postgresの初期化に十分な時間（これが重要！）

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/rails
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - RAILS_ENV=development
      - RAILS_SERVE_STATIC_FILES=true
      - DATABASE_HOST=db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=password
      - DATABASE_NAME=baukis2_development   # ← 追加推奨
    command: ./bin/dev
    tty: true
    stdin_open: true

volumes:
  db-data: